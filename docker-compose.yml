services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: voxintel
      POSTGRES_PASSWORD: voxintel
      POSTGRES_DB: voxintel
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U voxintel"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: voxintel
      MINIO_ROOT_PASSWORD: voxintel123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  

  api:
    build:
      context: ./Server
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    environment:
      ENVIRONMENT: development
      CORS_ORIGINS: http://localhost:5173
  
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      JWT_SECRET_KEY: dev-only-secret-change-me
      JWT_ALGORITHM: HS256
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: 1440
      AUTH_RATE_LIMIT_MAX_ATTEMPTS: 10
      AUTH_RATE_LIMIT_WINDOW_SECONDS: 60
      STORAGE_ENDPOINT_URL: ${STORAGE_ENDPOINT_URL}
      STORAGE_ACCESS_KEY: ${STORAGE_ACCESS_KEY}
      STORAGE_SECRET_KEY: ${STORAGE_SECRET_KEY}
      STORAGE_BUCKET: ${STORAGE_BUCKET}
      STORAGE_REGION: ${STORAGE_REGION}
      STORAGE_SECURE: ${STORAGE_SECURE}
      MAX_UPLOAD_SIZE_BYTES: 524288000
      
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    ports:
      - "8001:8000"
    volumes:
      - ./Server:/srv

  worker:
    build:
      context: ./Server
      dockerfile: Dockerfile.worker
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      STORAGE_ENDPOINT_URL: ${STORAGE_ENDPOINT_URL}
      STORAGE_ACCESS_KEY: ${STORAGE_ACCESS_KEY}
      STORAGE_SECRET_KEY: ${STORAGE_SECRET_KEY}
      STORAGE_BUCKET: ${STORAGE_BUCKET}
      STORAGE_REGION: ${STORAGE_REGION}
      STORAGE_SECURE: ${STORAGE_SECURE}
      WHISPER_MODEL_SIZE: base
      # pyannote/speaker-diarization-3.1 is gated on Hugging Face -- see
      # the root .env.example for how to set this. Diarization fails with
      # a clear error (not a crash) if it's left blank.
      HF_TOKEN: ${HF_TOKEN}
      # Phase 4 (AI summaries) -- see the root .env.example for how to set
      # this. Summarization fails with a clear error (not a crash) if it's
      # left blank.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: claude-opus-4-8
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
      
    volumes:
      - ./Server:/srv
      - whisper_cache:/root/.cache/whisper
      - hf_cache:/root/.cache/huggingface

  client:
    build:
      context: ./Client
    environment:
      VITE_API_URL: http://localhost:8001
    depends_on:
      - api
    ports:
      - "5173:5173"
    volumes:
      - ./Client:/app
      - /app/node_modules

volumes:
  postgres_data:
  minio_data:
  whisper_cache:
  hf_cache:
